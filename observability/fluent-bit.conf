[SERVICE]
    Flush        1
    Log_Level    info
    Parsers_File /fluent-bit/etc/parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020
    Health_Check On

# --- Input: tail all Docker container logs ---

[INPUT]
    Name         tail
    Tag          docker.<container_id>
    Tag_Regex    /var/lib/docker/containers/(?<container_id>[^/]+)/[^/]+\.log
    Path         /var/lib/docker/containers/*/*.log
    Parser       docker
    Docker_Mode  On
    Refresh_Interval 10
    Mem_Buf_Limit 5MB
    Skip_Long_Lines On

# --- Filter: parse JSON log content from Quarkus services ---

[FILTER]
    Name         parser
    Match        docker.*
    Key_Name     log
    Parser       json_parser
    Reserve_Data On

# --- Filter: resolve container ID to service.name via Lua ---

[FILTER]
    Name         lua
    Match        docker.*
    script       /fluent-bit/etc/service_name.lua
    call         set_service_name

# --- Output: forward to OTel Collector ---

[OUTPUT]
    Name         forward
    Match        docker.*
    Host         otel-collector
    Port         24224
