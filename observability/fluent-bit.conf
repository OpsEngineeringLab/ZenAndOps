[SERVICE]
    Flush        1
    Log_Level    info
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020
    Health_Check On

[INPUT]
    Name         tail
    Tag          docker.*
    Path         /var/lib/docker/containers/*/*.log
    Parser       docker
    Docker_Mode  On
    Refresh_Interval 10
    Mem_Buf_Limit 5MB
    Skip_Long_Lines On

[FILTER]
    Name         parser
    Match        docker.*
    Key_Name     log
    Parser       json_parser
    Reserve_Data On

[OUTPUT]
    Name         loki
    Match        docker.*
    Host         loki
    Port         3100
    Labels       job=fluent-bit
    Auto_Kubernetes_Labels Off
    Line_Format  json
