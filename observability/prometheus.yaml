# =============================================================================
# Prometheus Configuration
# =============================================================================
# Scrapes all metric sources and remote-writes to Mimir for long-term storage.
#
# Targets:
#   - Kong Gateway (/metrics on status port)
#   - Quarkus services (/q/metrics)
#   (Infrastructure exporters removed: MongoDB, Kafka, Node, cAdvisor)
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: zenandops
    environment: development

remote_write:
  - url: http://mimir:9009/api/v1/push

scrape_configs:
  # --- Keycloak ---
  - job_name: zenandops-keycloak
    metrics_path: /metrics
    static_configs:
      - targets: ["keycloak:9000"]
        labels:
          service: zenandops-keycloak

  # --- Kong Gateway ---
  - job_name: zenandops-kong-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["kong-gateway:8100"]
        labels:
          service: zenandops-kong-gateway

  # --- Quarkus microservices ---
  - job_name: zenandops-admin-api
    metrics_path: /q/metrics
    static_configs:
      - targets: ["admin-api-service:8084"]
        labels:
          service: zenandops-admin-api

  - job_name: zenandops-dashboard
    metrics_path: /q/metrics
    static_configs:
      - targets: ["dashboard-service:8082"]
        labels:
          service: zenandops-dashboard

  - job_name: zenandops-cmdb
    metrics_path: /q/metrics
    static_configs:
      - targets: ["cmdb-service:8083"]
        labels:
          service: zenandops-cmdb
