services:

  # --- Infrastructure ---

  mongodb:
    image: mongo:8
    container_name: zenandops-mongodb
    ports:
      - "${MONGODB_PORT}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD}
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - zenandops-net

  kafka:
    image: apache/kafka:4.2.0
    container_name: zenandops-kafka
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      # KRaft mode (no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: ZenAndOpsKafkaClusterId01
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - zenandops-net

  # --- Backend Services ---

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    image: zenandops/auth-service:${ZENANDOPS_VERSION}
    container_name: zenandops-auth-service
    ports:
      - "${AUTH_SERVICE_PORT}:8081"
    environment:
      QUARKUS_HTTP_PORT: 8081
      QUARKUS_MONGODB_CONNECTION_STRING: mongodb://${MONGODB_ROOT_USERNAME}:${MONGODB_ROOT_PASSWORD}@mongodb:27017
      QUARKUS_MONGODB_DATABASE: ${AUTH_DB_NAME}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MP_JWT_VERIFY_PUBLICKEY: ${JWT_PUBLIC_KEY}
      MP_JWT_VERIFY_ISSUER: ${JWT_ISSUER}
      SMALLRYE_JWT_SIGN_KEY: ${JWT_PRIVATE_KEY}
      SMALLRYE_JWT_NEW_TOKEN_ISSUER: ${JWT_ISSUER}
      ZENANDOPS_JWT_ISSUER: ${JWT_ISSUER}
      ZENANDOPS_JWT_ACCESS_TOKEN_EXPIRATION_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES}
      ZENANDOPS_JWT_REFRESH_TOKEN_EXPIRATION_HOURS: ${JWT_REFRESH_TOKEN_EXPIRATION_HOURS}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    networks:
      - zenandops-net

  dashboard-service:
    build:
      context: ./dashboard-service
      dockerfile: Dockerfile
    image: zenandops/dashboard-service:${ZENANDOPS_VERSION}
    container_name: zenandops-dashboard-service
    ports:
      - "${DASHBOARD_SERVICE_PORT}:8082"
    environment:
      QUARKUS_HTTP_PORT: 8082
      MP_JWT_VERIFY_PUBLICKEY: ${JWT_PUBLIC_KEY}
      MP_JWT_VERIFY_ISSUER: ${JWT_ISSUER}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_healthy
    networks:
      - zenandops-net

  cmdb-service:
    build:
      context: ./cmdb-service
      dockerfile: Dockerfile
    image: zenandops/cmdb-service:${ZENANDOPS_VERSION}
    container_name: zenandops-cmdb-service
    ports:
      - "${CMDB_SERVICE_PORT:-8083}:8083"
    environment:
      QUARKUS_HTTP_PORT: 8083
      QUARKUS_MONGODB_CONNECTION_STRING: mongodb://${MONGODB_ROOT_USERNAME}:${MONGODB_ROOT_PASSWORD}@mongodb:27017
      QUARKUS_MONGODB_DATABASE: ${CMDB_DB_NAME:-zenandops-cmdb}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MP_JWT_VERIFY_PUBLICKEY: ${JWT_PUBLIC_KEY}
      MP_JWT_VERIFY_ISSUER: ${JWT_ISSUER}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      CMDB_IMPACT_ANALYSIS_MAX_DEPTH: ${CMDB_IMPACT_ANALYSIS_MAX_DEPTH:-10}
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    networks:
      - zenandops-net

  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    image: zenandops/gateway-service:${ZENANDOPS_VERSION}
    container_name: zenandops-gateway-service
    ports:
      - "${GATEWAY_SERVICE_PORT}:8080"
    environment:
      QUARKUS_HTTP_PORT: 8080
      GATEWAY_AUTH_SERVICE_URL: ${GATEWAY_AUTH_SERVICE_URL}
      GATEWAY_DASHBOARD_SERVICE_URL: ${GATEWAY_DASHBOARD_SERVICE_URL}
      GATEWAY_CMDB_SERVICE_URL: ${GATEWAY_CMDB_SERVICE_URL}
      GATEWAY_RATE_LIMIT_MAX_REQUESTS: ${GATEWAY_RATE_LIMIT_MAX_REQUESTS}
      GATEWAY_RATE_LIMIT_WINDOW_SECONDS: ${GATEWAY_RATE_LIMIT_WINDOW_SECONDS}
      MP_JWT_VERIFY_PUBLICKEY: ${JWT_PUBLIC_KEY}
      MP_JWT_VERIFY_ISSUER: ${JWT_ISSUER}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      auth-service:
        condition: service_started
      dashboard-service:
        condition: service_started
      cmdb-service:
        condition: service_started
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "java", "-cp", "/app/healthcheck", "HealthCheck", "http://localhost:8080/q/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - zenandops-net

  # --- Frontend ---

  frontend-app:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
      args:
        VITE_GATEWAY_URL: http://localhost:${GATEWAY_SERVICE_PORT}
    image: zenandops/frontend-app:${ZENANDOPS_VERSION}
    container_name: zenandops-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      gateway-service:
        condition: service_healthy
    networks:
      - zenandops-net

  # --- Observability Stack ---

  loki:
    image: grafana/loki:3.4.3
    container_name: zenandops-loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - loki-data:/loki
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - zenandops-net

  mimir:
    image: grafana/mimir:2.16.0
    container_name: zenandops-mimir
    ports:
      - "${MIMIR_PORT:-9009}:9009"
    command: ["--config.file=/etc/mimir/mimir.yaml"]
    volumes:
      - mimir-data:/data/mimir
      - ./observability/mimir-config.yaml:/etc/mimir/mimir.yaml
    networks:
      - zenandops-net

  tempo:
    image: grafana/tempo:2.10.5
    container_name: zenandops-tempo
    ports:
      - "${TEMPO_PORT:-3200}:3200"
    command: ["--config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - tempo-data:/var/tempo
      - ./observability/tempo-config.yaml:/etc/tempo/tempo.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - zenandops-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.127.0
    container_name: zenandops-otel-collector
    ports:
      - "${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"
      - "${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"
      - "${OTEL_COLLECTOR_HEALTH_PORT:-13133}:13133"
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol/config.yaml
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config=/etc/otelcol/config.yaml"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      loki:
        condition: service_healthy
      mimir:
        condition: service_started
      tempo:
        condition: service_healthy
    networks:
      - zenandops-net

  fluent-bit:
    image: fluent/fluent-bit:4.0
    container_name: zenandops-fluent-bit
    ports:
      - "${FLUENT_BIT_MONITOR_PORT:-2020}:2020"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./observability/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf
      - ./observability/fluent-bit-parsers.conf:/fluent-bit/etc/parsers.conf
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:2020/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      otel-collector:
        condition: service_healthy
    networks:
      - zenandops-net

  grafana:
    image: grafana/grafana:13.0.1
    container_name: zenandops-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      loki:
        condition: service_healthy
      mimir:
        condition: service_started
      tempo:
        condition: service_healthy
    networks:
      - zenandops-net

volumes:
  mongodb-data:
  loki-data:
  mimir-data:
  tempo-data:
  grafana-data:

networks:
  zenandops-net:
    driver: bridge
