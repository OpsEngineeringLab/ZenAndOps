services:

  # --- Infrastructure ---

  mongodb:
    image: mongo:8
    container_name: zenandops-mongodb
    ports:
      - "${MONGODB_PORT}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD}
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - zenandops-net

  kafka:
    image: apache/kafka:4.2.0
    container_name: zenandops-kafka
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      # KRaft mode (no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: ZenAndOpsKafkaClusterId01
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - zenandops-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: zenandops-keycloak
    command: ["start-dev", "--import-realm", "--health-enabled=true", "--metrics-enabled=true", "--tracing-enabled=true"]
    ports:
      - "${KEYCLOAK_PORT:-8180}:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KC_TRACING_ENDPOINT: http://tempo:4317
      KC_TRACING_PROTOCOL: grpc
      KC_TRACING_SAMPLER_TYPE: parentbased_traceidratio
      KC_TRACING_SAMPLER_RATIO: "1.0"
      KC_TRACING_SERVICE_NAME: zenandops-keycloak
      KC_TRACING_RESOURCE_ATTRIBUTES: "service.namespace=zenandops"
    volumes:
      - ./keycloak/zenandops-realm.json:/opt/keycloak/data/import/zenandops-realm.json
      - ./keycloak-event-listener/target/keycloak-event-listener-1.7.0.jar:/opt/keycloak/providers/keycloak-event-listener.jar
      - ./keycloak/themes/zenandops:/opt/keycloak/themes/zenandops
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      kafka:
        condition: service_healthy
      tempo:
        condition: service_started
    networks:
      - zenandops-net

  # --- Backend Services ---

  dashboard-service:
    build:
      context: ./dashboard-service
      dockerfile: Dockerfile
    image: zenandops/dashboard-service:${ZENANDOPS_VERSION}
    container_name: zenandops-dashboard-service
    ports:
      - "${DASHBOARD_SERVICE_PORT}:8082"
    environment:
      QUARKUS_HTTP_PORT: 8082
      QUARKUS_OIDC_AUTH_SERVER_URL: http://keycloak:8080/realms/zenandops
      QUARKUS_OIDC_CLIENT_ID: ${KEYCLOAK_BACKEND_CLIENT_ID}
      QUARKUS_OIDC_TOKEN_ISSUER: http://localhost:${KEYCLOAK_PORT:-8180}/realms/zenandops
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
    depends_on:
      keycloak:
        condition: service_healthy
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD", "java", "-cp", "/app/healthcheck", "HealthCheck", "http://localhost:8082/q/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - zenandops-net

  cmdb-service:
    build:
      context: ./cmdb-service
      dockerfile: Dockerfile
    image: zenandops/cmdb-service:${ZENANDOPS_VERSION}
    container_name: zenandops-cmdb-service
    ports:
      - "${CMDB_SERVICE_PORT:-8083}:8083"
    environment:
      QUARKUS_HTTP_PORT: 8083
      QUARKUS_OIDC_AUTH_SERVER_URL: http://keycloak:8080/realms/zenandops
      QUARKUS_OIDC_CLIENT_ID: ${KEYCLOAK_BACKEND_CLIENT_ID}
      QUARKUS_OIDC_TOKEN_ISSUER: http://localhost:${KEYCLOAK_PORT:-8180}/realms/zenandops
      QUARKUS_MONGODB_CONNECTION_STRING: mongodb://${MONGODB_ROOT_USERNAME}:${MONGODB_ROOT_PASSWORD}@mongodb:27017
      QUARKUS_MONGODB_DATABASE: ${CMDB_DB_NAME:-zenandops-cmdb}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      CMDB_IMPACT_ANALYSIS_MAX_DEPTH: ${CMDB_IMPACT_ANALYSIS_MAX_DEPTH:-10}
    depends_on:
      keycloak:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD", "java", "-cp", "/app/healthcheck", "HealthCheck", "http://localhost:8083/q/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - zenandops-net

  admin-api-service:
    build:
      context: ./admin-api-service
      dockerfile: Dockerfile
    image: zenandops/admin-api-service:${ZENANDOPS_VERSION}
    container_name: zenandops-admin-api-service
    environment:
      QUARKUS_HTTP_PORT: 8084
      QUARKUS_OIDC_AUTH_SERVER_URL: http://keycloak:8080/realms/zenandops
      QUARKUS_OIDC_CLIENT_ID: ${KEYCLOAK_BACKEND_CLIENT_ID}
      QUARKUS_OIDC_CREDENTIALS_SECRET: ${KEYCLOAK_BACKEND_CLIENT_SECRET}
      QUARKUS_OIDC_TOKEN_ISSUER: http://localhost:${KEYCLOAK_PORT:-8180}/realms/zenandops
      QUARKUS_OIDC_CLIENT_AUTH_SERVER_URL: http://keycloak:8080/realms/zenandops
      QUARKUS_OIDC_CLIENT_CLIENT_ID: ${KEYCLOAK_BACKEND_CLIENT_ID}
      QUARKUS_OIDC_CLIENT_CREDENTIALS_SECRET: ${KEYCLOAK_BACKEND_CLIENT_SECRET}
      ADMIN_KEYCLOAK_ADMIN_URL: http://keycloak:8080/admin/realms/zenandops
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
    depends_on:
      keycloak:
        condition: service_healthy
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD", "java", "-cp", "/app/healthcheck", "HealthCheck", "http://localhost:8084/q/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - zenandops-net

  kong-gateway:
    image: kong:3
    container_name: zenandops-kong-gateway
    ports:
      - "${GATEWAY_SERVICE_PORT}:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "off"
      KONG_STATUS_LISTEN: "0.0.0.0:8100"
      KONG_LOG_LEVEL: info
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_PLUGINS: "bundled"
      KONG_TRACING_INSTRUMENTATIONS: all
      KONG_TRACING_SAMPLING_RATE: "1.0"
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    depends_on:
      keycloak:
        condition: service_healthy
      dashboard-service:
        condition: service_healthy
      cmdb-service:
        condition: service_healthy
      admin-api-service:
        condition: service_healthy
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "kong health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - zenandops-net

  # --- Frontend ---

  frontend-app:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
      args:
        VITE_GATEWAY_URL: http://localhost:${GATEWAY_SERVICE_PORT}
        VITE_KEYCLOAK_URL: http://localhost:${KEYCLOAK_PORT:-8180}
        VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM}
        VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_FRONTEND_CLIENT_ID}
    image: zenandops/frontend-app:${ZENANDOPS_VERSION}
    container_name: zenandops-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      kong-gateway:
        condition: service_healthy
    networks:
      - zenandops-net

  # --- Observability Stack ---

  loki:
    image: grafana/loki:3.4.3
    container_name: zenandops-loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - loki-data:/loki
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - zenandops-net

  mimir:
    image: grafana/mimir:2.16.0
    container_name: zenandops-mimir
    ports:
      - "${MIMIR_PORT:-9009}:9009"
    command: ["--config.file=/etc/mimir/mimir.yaml"]
    volumes:
      - mimir-data:/data/mimir
      - ./observability/mimir-config.yaml:/etc/mimir/mimir.yaml
    networks:
      - zenandops-net

  tempo:
    image: grafana/tempo:2.10.5
    container_name: zenandops-tempo
    ports:
      - "${TEMPO_PORT:-3200}:3200"
    command: ["--config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - tempo-data:/var/tempo
      - ./observability/tempo-config.yaml:/etc/tempo/tempo.yaml
    healthcheck:
      disable: true
    networks:
      - zenandops-net

  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: zenandops-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.retention.time=2h"
    volumes:
      - prometheus-data:/prometheus
      - ./observability/prometheus.yaml:/etc/prometheus/prometheus.yml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      mimir:
        condition: service_started
    networks:
      - zenandops-net

  fluent-bit:
    image: fluent/fluent-bit:4.0
    container_name: zenandops-fluent-bit
    ports:
      - "${FLUENT_BIT_MONITOR_PORT:-2020}:2020"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./observability/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf
      - ./observability/fluent-bit-parsers.conf:/fluent-bit/etc/parsers.conf
      - ./observability/fluent-bit-service-name.lua:/fluent-bit/etc/service_name.lua
      - fluent-bit-db:/fluent-bit/db
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:2020/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - zenandops-net

  grafana:
    image: grafana/grafana:13.0.1
    container_name: zenandops-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      loki:
        condition: service_healthy
      mimir:
        condition: service_started
      tempo:
        condition: service_started
    networks:
      - zenandops-net

volumes:
  mongodb-data:
  loki-data:
  mimir-data:
  tempo-data:
  prometheus-data:
  grafana-data:
  fluent-bit-db:

networks:
  zenandops-net:
    driver: bridge
