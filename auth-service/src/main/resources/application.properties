# ZenAndOps Auth Service Configuration

# HTTP
quarkus.http.port=8080

# MongoDB
quarkus.mongodb.connection-string=mongodb://localhost:27017
quarkus.mongodb.database=zenandops-auth

# JWT
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://zenandops.com
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.lifespan=900
smallrye.jwt.new-token.issuer=https://zenandops.com

# Kafka
mp.messaging.outgoing.auth-events.connector=smallrye-kafka
mp.messaging.outgoing.auth-events.topic=auth-events
mp.messaging.outgoing.auth-events.value.serializer=org.apache.kafka.common.serialization.StringSerializer
kafka.bootstrap.servers=localhost:9092
