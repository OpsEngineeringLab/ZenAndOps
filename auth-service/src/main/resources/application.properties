# ZenAndOps Auth Service Configuration

# HTTP
quarkus.http.port=8081

# MongoDB
quarkus.mongodb.connection-string=mongodb://localhost:27017
quarkus.mongodb.database=zenandops-auth

# JWT Verification (inline PEM via environment variable)
mp.jwt.verify.publickey=${MP_JWT_VERIFY_PUBLICKEY:}
mp.jwt.verify.issuer=https://zenandops.com

# JWT Signing (inline PEM via environment variable)
smallrye.jwt.sign.key=${SMALLRYE_JWT_SIGN_KEY:}
smallrye.jwt.new-token.lifespan=900
smallrye.jwt.new-token.issuer=https://zenandops.com

# Custom JWT Configuration
zenandops.jwt.issuer=https://zenandops.com
zenandops.jwt.access-token-expiration-minutes=15
zenandops.jwt.refresh-token-expiration-hours=8

# OpenAPI and Swagger UI
quarkus.smallrye-openapi.info-title=ZenAndOps Auth Service API
quarkus.smallrye-openapi.info-version=1.2.0
quarkus.swagger-ui.always-include=true

# Kafka
kafka.bootstrap.servers=localhost:9092
mp.messaging.outgoing.auth-events.connector=smallrye-kafka
mp.messaging.outgoing.auth-events.topic=auth-events
mp.messaging.outgoing.auth-events.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# OpenTelemetry core
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.application.name=zenandops-auth

# Tracing
quarkus.otel.traces.enabled=true
quarkus.otel.traces.sampler=parentbased_traceidratio
quarkus.otel.traces.sampler.arg=${OTEL_TRACES_SAMPLER_ARG:1.0}

# Logging via OTel
quarkus.otel.logs.enabled=true

# Metrics via Micrometer bridge
quarkus.otel.metrics.enabled=true
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.http-server.enabled=true
quarkus.micrometer.binder.http-server.match-patterns=/api/v1/auth/login=/api/v1/auth/login,/api/v1/auth/refresh=/api/v1/auth/refresh
quarkus.micrometer.binder.mongodb.enabled=true

# Enable histogram buckets for HTTP server metrics (required for histogram_quantile in Grafana)
quarkus.micrometer.distribution.percentiles-histogram[http.server.requests]=true
quarkus.micrometer.distribution.minimum-expected-value[http.server.requests]=0.001
quarkus.micrometer.distribution.maximum-expected-value[http.server.requests]=5

# Structured JSON logging
quarkus.log.console.json=true
