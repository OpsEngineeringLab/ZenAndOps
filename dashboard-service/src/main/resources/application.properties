# ZenAndOps Dashboard Service Configuration

# HTTP (different port from Auth_Service which runs on 8081)
quarkus.http.port=8082

# JWT validation (inline PEM via environment variable, shared issuer with Auth_Service)
mp.jwt.verify.publickey=${MP_JWT_VERIFY_PUBLICKEY:}
mp.jwt.verify.issuer=https://zenandops.com

# OpenAPI and Swagger UI
quarkus.smallrye-openapi.info-title=ZenAndOps Dashboard Service API
quarkus.smallrye-openapi.info-version=1.2.0
quarkus.swagger-ui.always-include=true

# OpenTelemetry core
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.application.name=zenandops-dashboard

# Tracing
quarkus.otel.traces.enabled=true
quarkus.otel.traces.sampler=parentbased_traceidratio
quarkus.otel.traces.sampler.arg=${OTEL_TRACES_SAMPLER_ARG:1.0}

# Logging via OTel
quarkus.otel.logs.enabled=true

# Metrics via Micrometer bridge
quarkus.otel.metrics.enabled=true
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.http-server.enabled=true

# Enable histogram buckets for HTTP server metrics (required for histogram_quantile in Grafana)
quarkus.micrometer.export.prometheus.histogram-enabled=true
quarkus.micrometer.distribution.percentiles-histogram[http.server.requests]=true
quarkus.micrometer.distribution.minimum-expected-value[http.server.requests]=1
quarkus.micrometer.distribution.maximum-expected-value[http.server.requests]=5000

# Structured JSON logging
quarkus.log.console.json=true
